<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2025 电赛 C题 — 单目视觉测量</title>
<style>
:root{color-scheme:dark;--bg:#090b09;--panel:rgba(17,20,17,.96);--panel-2:#151a15;
--line:#2b3329;--text:#eef2e8;--muted:#838d7b;--muted-2:#5f685b;--accent:#c7ad67;
--accent-hover:#dcc579;--accent-rgb:199,173,103;--good:#6eb47a;--bad:#e26f61;
--radius:8px;--radius-lg:10px;--shadow:0 18px 48px rgba(5,8,5,.54);
--shadow-soft:0 10px 40px rgba(0,0,0,.28)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;
background:linear-gradient(180deg,#0b0e0b,#090b09 48%,#070807);
color:var(--text);font-family:system-ui,sans-serif;font-size:13px}
.app{min-height:100vh;display:grid;grid-template-rows:52px 1fr}
header{display:flex;align-items:center;gap:12px;padding:0 16px;
border-bottom:1px solid rgba(var(--accent-rgb),.14);
background:rgba(9,11,9,.9);backdrop-filter:blur(12px)}
.logo{width:28px;height:28px;border:1px solid rgba(var(--accent-rgb),.68);
display:grid;place-items:center;color:var(--accent);font-weight:700;font-size:13px;
border-radius:var(--radius);background:linear-gradient(180deg,rgba(var(--accent-rgb),.18),rgba(var(--accent-rgb),.06))}
h1{font-size:15px;font-weight:600;margin:0}
.spacer{flex:1}
.badge{font-size:11px;padding:2px 9px;border-radius:10px;border:1px solid var(--line);
background:var(--panel);color:var(--muted)}
.badge.on{border-color:var(--good);color:var(--good)}
main{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(0,.8fr);gap:12px;padding:12px;min-height:0}
.panel{background:var(--panel);border:1px solid rgba(var(--accent-rgb),.13);
border-radius:var(--radius-lg);overflow:hidden;
box-shadow:inset 0 1px 0 rgba(255,255,255,.035),var(--shadow-soft)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
border-bottom:1px solid var(--line);background:rgba(19,23,18,.96)}
.panel-head h2{margin:0;font-size:13px;color:var(--accent-hover);font-weight:700}
.panel-body{padding:0;min-height:0;overflow:auto}
.stage{background:var(--bg);display:grid;place-items:center;border-radius:0 0 var(--radius-lg) var(--radius-lg)}
.stage img{max-width:100%;max-height:calc(100vh-140px);object-fit:contain}
.right-col{display:grid;grid-template-rows:auto 1fr;gap:12px;min-height:0}
.test-select{display:flex;gap:8px;align-items:center;padding:10px 14px}
.test-select select{flex:1;background:var(--panel-2);color:var(--text);border:1px solid var(--line);
border-radius:var(--radius);padding:6px 8px;font-size:13px}
.test-preview{padding:0 10px 10px;text-align:center}
.test-preview img{max-width:100%;max-height:220px;border:1px solid var(--line);border-radius:var(--radius)}
.result-row{display:flex;align-items:center;gap:8px;padding:4px 14px;border-bottom:1px solid var(--line);font-size:12px}
.result-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.result-dot.circle{background:var(--good)}
.result-dot.triangle{background:var(--bad)}
.result-dot.square{background:var(--accent)}
.result-label{flex:1;color:var(--text)}
.result-size{color:var(--muted);font-size:11px}
.result-digit{color:var(--accent-hover);font-weight:700;margin-left:4px}
.empty-state{text-align:center;color:var(--muted);padding:30px;font-size:12px}
.summary{padding:8px 14px;font-size:11px;color:var(--accent-hover);border-top:1px solid var(--line)}
@media(max-width:900px){main{grid-template-columns:1fr}.right-col{grid-template-rows:auto auto}}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">C</div>
  <h1>2025 电赛 C题 · 单目视觉测量</h1>
  <span class="spacer"></span>
  <span class="badge on" id="statusBadge">● 实时</span>
  <span class="badge" id="countBadge">等待检测</span>
</header>
<main>
  <!-- 左：实时画面 -->
  <div class="panel">
    <div class="panel-head"><h2>实时检测画面</h2></div>
    <div class="stage"><img id="liveStream" src="/stream" alt="实时画面"></div>
  </div>
  <!-- 右：测试图+结果 -->
  <div class="right-col">
    <div class="panel">
      <div class="panel-head"><h2>测试图集</h2></div>
      <div class="test-select">
        <select id="testSelect" onchange="switchTest()"></select>
      </div>
      <div class="test-preview"><img id="testPreview" src="" alt="选择测试图"></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>检测结果</h2></div>
      <div class="panel-body" id="results"><div class="empty-state">等待检测...</div></div>
      <div class="summary" id="summary"></div>
    </div>
  </div>
</main>
</div>
<script>
// 测试图列表
const TEST_IMAGES = [
  {name:'基本·正方', src:'/test-images/target_005.png'},
  {name:'基本·三角', src:'/test-images/target_002.png'},
  {name:'基本·圆形', src:'/test-images/target_001.png'},
  {name:'分离正方', src:'/test-images/separated_001.png'},
  {name:'带编号', src:'/test-images/numbered_001.png'},
  {name:'重叠正方', src:'/test-images/overlap_001.png'}
];

// 填充下拉框
const sel = document.getElementById('testSelect');
TEST_IMAGES.forEach((img,i) => {
  const opt = document.createElement('option');
  opt.value = img.src; opt.textContent = img.name;
  sel.appendChild(opt);
});

function switchTest() {
  document.getElementById('testPreview').src = sel.value;
}
switchTest();

// 轮询检测结果
setInterval(async () => {
  try {
    const r = await fetch('/results');
    const d = await r.json();
    const el = document.getElementById('results');
    const sm = document.getElementById('summary');
    const cb = document.getElementById('countBadge');
    if (d.shapes && d.shapes.length) {
      el.innerHTML = d.shapes.map(s => {
        const cl = ['circle','triangle','square'].includes(s.t) ? s.t : 'square';
        return '<div class="result-row"><span class="result-dot '+cl+'"></span>'
          + '<span class="result-label">'+s.t+(s.d!=null?'<span class="result-digit">['+s.d+']</span>':'')+'</span>'
          + '<span class="result-size">'+Math.round(s.p)+'px</span></div>';
      }).join('');
      sm.textContent = d.shapes.length+' 个目标' + (d.minSq ? ' | 最小正方: '+Math.round(d.minSq)+'px' : '');
      cb.textContent = d.shapes.length+' 目标';
    } else {
      el.innerHTML = '<div class="empty-state">'+d.msg+'</div>';
      sm.textContent = '';
      cb.textContent = d.msg;
    }
  } catch(e) {}
}, 1000);
</script>
</body>
</html>
