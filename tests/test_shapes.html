<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>测距测试图形 — Phase 3a</title>
<style>
  body { margin:0; background:#fff; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  canvas { border:2px solid #000; }
  #info { position:fixed; bottom:10px; left:10px; font:14px monospace; color:#333; background:rgba(255,255,255,0.9); padding:8px; border-radius:4px; }
  #controls { position:fixed; top:10px; left:10px; font:14px sans-serif; }
  select, button { font:14px sans-serif; padding:6px 12px; margin:2px; }
</style>
</head>
<body>

<div id="controls">
  <select id="shapeSelect">
    <option value="square">正方形 400×400px</option>
    <option value="circle">圆形 Ø400px</option>
    <option value="triangle">等边三角形 400px</option>
    <option value="multi_square">正方形组合(3个, 200/300/400px)</option>
    <option value="a4_sim">A4纸模拟 595×842px</option>
  </select>
  <button onclick="switchShape()">切换</button>
</div>

<div id="info">图形: <span id="shapeName"></span> | 像素尺寸: <span id="pixelSize"></span><br>
屏幕实测物理尺寸: <span id="physicalSize" style="color:red">请用尺子量</span></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width = Math.min(window.innerWidth - 40, 1920);
const H = canvas.height = Math.min(window.innerHeight - 40, 1080);

function drawShape(type) {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  ctx.fillStyle = '#000000';

  switch(type) {
    case 'square':
      const sqSize = 400;
      ctx.fillRect(cx - sqSize/2, cy - sqSize/2, sqSize, sqSize);
      document.getElementById('shapeName').textContent = '正方形';
      document.getElementById('pixelSize').textContent = sqSize + '×' + sqSize + ' px';
      break;
    case 'circle':
      const r = 200;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      document.getElementById('shapeName').textContent = '圆形';
      document.getElementById('pixelSize').textContent = 'Ø' + (r*2) + ' px';
      break;
    case 'triangle':
      const th = 400 * Math.sqrt(3) / 2; // equilateral triangle height
      ctx.beginPath();
      ctx.moveTo(cx, cy - th/2);
      ctx.lineTo(cx + 200, cy + th/2);
      ctx.lineTo(cx - 200, cy + th/2);
      ctx.closePath();
      ctx.fill();
      document.getElementById('shapeName').textContent = '等边三角形';
      document.getElementById('pixelSize').textContent = '底400px × 高' + Math.round(th) + 'px';
      break;
    case 'multi_square':
      [200, 300, 400].forEach((sz, i) => {
        const offsetX = (i - 1) * (sz + 50);
        ctx.fillRect(cx + offsetX - sz/2, cy - sz/2, sz, sz);
      });
      document.getElementById('shapeName').textContent = '正方形组合(200/300/400px)';
      document.getElementById('pixelSize').textContent = '3个正方形, 间距50px';
      break;
    case 'a4_sim':
      // A4 proportion: 210×297mm → ratio ≈ 1:1.414
      const a4w = 595, a4h = 842;
      // black border 2cm → scaled: ~40px
      ctx.fillStyle = '#000000';
      ctx.fillRect(cx - a4w/2, cy - a4h/2, a4w, a4h);  // black background (border area)
      ctx.fillStyle = '#ffffff';
      const border = 40;
      ctx.fillRect(cx - a4w/2 + border, cy - a4h/2 + border, a4w - border*2, a4h - border*2);  // white inside
      // center square
      ctx.fillStyle = '#000000';
      const sq = 250;
      ctx.fillRect(cx - sq/2, cy - sq/2, sq, sq);
      document.getElementById('shapeName').textContent = 'A4纸模拟(595×842px + 黑边框)';
      document.getElementById('pixelSize').textContent = 'A4=595×842 边框40px 中心正方形250px';
      break;
  }
  document.getElementById('physicalSize').textContent = '请用尺子量屏幕上的图形';
}

function switchShape() {
  drawShape(document.getElementById('shapeSelect').value);
}

drawShape('square');
</script>
</body>
</html>
