<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>测距测试图形</title>
<style>body{margin:0;background:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}canvas{border:30px solid #000}#info{position:fixed;bottom:10px;left:10px;font:14px monospace;background:rgba(255,255,255,.9);padding:8px}#controls{position:fixed;top:10px;left:10px;font:14px sans-serif}select,button{font:14px sans-serif;padding:6px 12px;margin:2px}</style></head>
<body><div id="controls"><select id="s"><option value="square">正方形400px</option><option value="circle">圆形O400px</option><option value="triangle">等边三角形400px</option></select><button onclick="draw()">切换</button></div><div id="info">像素:<span id="px"></span></div><canvas id="c"></canvas>
<script>const W=Math.min(innerWidth-40,1920),H=Math.min(innerHeight-40,1080);c.width=W;c.height=H;const cx=W/2,cy=H/2,ctx=c.getContext('2d');function draw(){ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.fillStyle='#000';const t=s.value;if(t=='square'){const z=400;ctx.fillRect(cx-z/2,cy-z/2,z,z);px.textContent=z+'x'+z+'px'}else if(t=='circle'){const r=200;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();px.textContent='O'+r*2+'px'}else{const th=400*Math.sqrt(3)/2;ctx.beginPath();ctx.moveTo(cx,cy-th/2);ctx.lineTo(cx+200,cy+th/2);ctx.lineTo(cx-200,cy+th/2);ctx.closePath();ctx.fill();px.textContent='底400x高'+Math.round(th)+'px'}}draw();</script></body></html>
